[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings=["@openzeppelin=lib/interop/lib/optimism/packages/contracts-bedrock/lib/openzeppelin-contracts/", "@openzeppelin/contracts=lib/interop/lib/optimism/packages/contracts-bedrock/lib/openzeppelin-contracts/contracts/", "@contracts-bedrock=lib/interop/lib/optimism/packages/contracts-bedrock/src/", "@app=src/"]
fs_permissions = [{ access = "read-write", path = "./tx_data/" }]

evm_version = "cancun"
optimizer_runs = 800
via_ir = true
ffi = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
